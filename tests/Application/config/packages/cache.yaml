framework:
    cache:
        pools:
            site_context.cache:
                adapter: cache.adapter.filesystem
                tags: true
            snippets_context.cache:
                adapter: cache.adapter.filesystem
                tags: true
            admin_content_context.cache:
                adapter: cache.adapter.filesystem
            layout.cache:
                adapter: cache.adapter.filesystem
            block_context.cache:
                adapter: cache.adapter.filesystem
                tags: true
                default_lifetime: 1
            page_tree.cache:
                adapter: cache.adapter.filesystem
                tags: true
                default_lifetime: 1
